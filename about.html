<!doctype html>

<head>

  <link rel="stylesheet" href="./styles.css" />
  <style>.wrap { padding: 20px; max-width: 600px; margin: 0 auto; } a { color: var(--accent); }</style>
</head>
<body>
  <div class="wrap">
    <p><a href="./">&larr; Hub</a></p>
    <h1>About</h1>
    <p>A personal PWA launcher. Each tile is a self-contained mini-app under <code>tools/</code>.</p>
    <p>To add one:</p>
    <ol>
      <li>Copy <code>tools/_template/</code> to <code>tools/your-tool/</code>.</li>
      <li>Add an entry in <code>tools.json</code>.</li>
      <li>Commit &amp; push — your host redeploys and your phone picks it up on refresh.</li>
    </ol>
  </div>
</body>
</html>
